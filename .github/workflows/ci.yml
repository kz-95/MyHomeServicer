name: CI

# Single pipeline: lint, build, test, E2E, Docker image, deploy report, notify.
#
# Triggers:
#   push to master  → full pipeline (build + publish backend image + deploy report)
#   pull request    → checks only (no push, no Pages deploy)
#
# Cost estimate:
#   backend-check  ~2 min
#   frontend-check ~1 min
#   backend-image  ~2 min
#   notify         ~0.1 min
#   Total          ~3–5 min
#
# WhatsApp: set META_TOKEN, META_PHONE_ID, META_WHATSAPP_TO secrets.
# Uses Meta WhatsApp Cloud API (free tier: 1000 msgs/month). Skipped if not set.

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

permissions:
  actions: read
  contents: read
  deployments: write
  id-token: write
  packages: write
  pages: write

env:
  NODE_VERSION: 20
  TZ: Asia/Kuala_Lumpur

jobs:
  # ── Backend: lint, TypeScript, unit tests, build ──────────────────────────
  backend-check:
    name: Backend checks
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/homeservices
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        working-directory: backend
        run: npm ci --no-audit --no-fund

      - name: Generate Prisma client
        working-directory: backend
        run: npx prisma generate

      - name: Lint
        working-directory: backend
        run: npm run lint

      - name: TypeScript check
        working-directory: backend
        run: npx tsc --noEmit

      - name: Unit tests
        working-directory: backend
        run: npm test

      - name: Build
        working-directory: backend
        run: npm run build

  # ── Frontend: TypeScript, build ───────────────────────────────────────────
  frontend-check:
    name: Frontend checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        working-directory: frontend
        run: npm ci --no-audit --no-fund

      - name: TypeScript check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Build
        working-directory: frontend
        run: npm run build

  # ── E2E: disabled (2026-06-12) ────────────────────────────────────────────
  # e2e-check, deploy-e2e-report, and image build removed from pipeline.
  # Re-enable when Playwright tests are stable and GH Pages report infra is
  # set up on the target account.

  # ── Backend Docker image (build + push to GHCR on master) ────────────────
  backend-image:
    name: Backend Docker image
    runs-on: ubuntu-latest
    needs: backend-check
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}-backend
          tags: |
            type=raw,value=master,enable=${{ github.event_name == 'push' && github.ref == 'refs/heads/master' }}
            type=raw,value=latest,enable=${{ github.event_name == 'push' && github.ref == 'refs/heads/master' }}
            type=sha,prefix=sha-
            type=ref,event=pr

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: backend/Dockerfile
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/master' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

  # ── WhatsApp notification via Meta Cloud API ──────────────────────────────
  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs:
      - backend-check
      - frontend-check
      - backend-image
    if: always() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
    continue-on-error: true
    env:
      META_TOKEN: ${{ secrets.META_TOKEN || '' }}
      META_PHONE_ID: ${{ secrets.META_PHONE_ID || '' }}
      META_WHATSAPP_TO: ${{ secrets.META_WHATSAPP_TO || '' }}
    steps:
      - name: Send WhatsApp notification
        if: env.META_TOKEN != '' && env.META_PHONE_ID != '' && env.META_WHATSAPP_TO != ''
        shell: bash
        run: |
          REF="${{ github.ref_name }}"
          EVENT="${{ github.event_name }}"

          if [ "$EVENT" = "pull_request" ]; then
            TITLE="[PR #${{ github.event.pull_request.number }}] ${{ github.event.pull_request.title }}"
          elif [ "$EVENT" = "push" ] && [ "$REF" = "master" ]; then
            TITLE="[master deploy]"
          else
            TITLE="[$REF]"
          fi

          URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          B="${{ needs.backend-check.result }}"
          F="${{ needs.frontend-check.result }}"
          IMG="${{ needs.backend-image.result }}"

          FAILS=0
          [ "$B" != "success" ] && [ "$B" != "skipped" ] && FAILS=$((FAILS+1))
          [ "$F" != "success" ] && [ "$F" != "skipped" ] && FAILS=$((FAILS+1))
          [ "$IMG" != "success" ] && [ "$IMG" != "skipped" ] && FAILS=$((FAILS+1))

          COMMIT="${{ github.sha }}"
          if [ "$FAILS" -eq 0 ]; then
            TEXT="*PASS* ${TITLE}%0ACommit: ${COMMIT:0:7}%0AB=${B} F=${F} Img=${IMG}%0A${URL}"
          else
            TEXT="*FAIL* ${TITLE}%0ACommit: ${COMMIT:0:7}%0AB=${B} F=${F} Img=${IMG}%0A${URL}"
          fi

          TO="$META_WHATSAPP_TO"
          RTYPE="individual"
          if echo "$TO" | grep -q "@g.us"; then RTYPE="group"; fi

          RESP=$(curl -s -w '\n%{http_code}' -X POST "https://graph.facebook.com/v25.0/${META_PHONE_ID}/messages" \
            -H "Authorization: Bearer ${META_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"messaging_product\":\"whatsapp\",\"recipient_type\":\"${RTYPE}\",\"to\":\"${TO}\",\"type\":\"text\",\"text\":{\"preview_url\":true,\"body\":\"${TEXT}\"}}")
          HTTP_CODE=$(echo "$RESP" | tail -1)
          BODY=$(echo "$RESP" | sed '$d')
          echo "Meta API HTTP ${HTTP_CODE}: ${BODY}"
