name: PR Gate

# The main quality gate. Runs on pull requests targeting master only.
# Full suite: lint, build, unit tests, API E2E, browser E2E, Secret scan,
# Semgrep SAST, prompt injection test, npm audit, and WhatsApp notification.
#
# Cost: ~10-12 min per PR. Well within 2,000-min free tier at ~5 PRs/month.
#
# WhatsApp: set META_TOKEN, META_PHONE_ID, META_WHATSAPP_TO GitHub secrets.
# Uses Meta WhatsApp Cloud API (free: 1000 msgs/month). Skipped if not set.

on:
  pull_request:
    branches: [master]

jobs:
  # ── Backend: lint, build, unit tests ───────────────────────────────────────
  backend:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Kuala_Lumpur

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: backend
        run: npm install --no-audit --no-fund

      - name: Generate Prisma client
        working-directory: backend
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/homeservices

      - name: Lint
        working-directory: backend
        run: npm run lint

      - name: TypeScript check
        working-directory: backend
        run: npx tsc --noEmit

      - name: Unit tests
        working-directory: backend
        run: npm test

  # ── Frontend: build ────────────────────────────────────────────────────────
  frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: frontend
        run: npm install --no-audit --no-fund

      - name: TypeScript check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Build
        working-directory: frontend
        run: npm run build

  # ── Backend: API-level E2E against real Postgres + Redis ───────────────────
  backend-e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: homeservices
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s --health-timeout 5s --health-retries 5

      redis:
        image: redis:7
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s --health-timeout 5s --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/homeservices
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci-test-jwt-secret-value-0123456789abcdef
      REFRESH_SECRET: ci-test-refresh-secret-value-0123456789abcdef
      NODE_ENV: development
      TZ: Asia/Kuala_Lumpur

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: backend
        run: npm install --no-audit --no-fund

      - name: Sync schema + generate
        working-directory: backend
        run: |
          npx prisma db push --skip-generate
          npx prisma generate

      - name: Seed demo data
        working-directory: backend
        run: npm run seed

      - name: Run API E2E tests
        working-directory: backend
        run: npm run test:e2e

  # ── Browser E2E: Playwright ────────────────────────────────────────────────
  browser-e2e:
    needs: [backend-e2e]
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: homeservices
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s --health-timeout 5s --health-retries 5

      redis:
        image: redis:7
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s --health-timeout 5s --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/homeservices
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci-test-jwt-secret-value-0123456789abcdef
      REFRESH_SECRET: ci-test-refresh-secret-value-0123456789abcdef
      NODE_ENV: development
      TZ: Asia/Kuala_Lumpur

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install backend dependencies
        working-directory: backend
        run: npm install --no-audit --no-fund

      - name: Sync schema + seed
        working-directory: backend
        run: |
          npx prisma db push --skip-generate
          npx prisma generate
          npm run seed

      - name: Start backend server
        working-directory: backend
        run: |
          npx ts-node src/index.ts &
          sleep 5
          curl -s http://localhost:3000/health || true

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install --no-audit --no-fund

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Start frontend dev server
        working-directory: frontend
        run: |
          npx ng serve --host 0.0.0.0 --port 4200 &
          sleep 30
          curl -s http://localhost:4200 | head -20 || true

      - name: Run browser E2E tests
        working-directory: frontend
        run: npx playwright test
        env:
          CI: 'true'

  # ── Secret scanning ────────────────────────────────────────────────────────
  secret-scan:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml

      - name: trufflehog
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --results=verified,unknown

  # ── Dependency vulnerability audit ────────────────────────────────────────
  npm-audit:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Audit backend
        working-directory: backend
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Audit frontend
        working-directory: frontend
        run: npm audit --audit-level=high
        continue-on-error: true

  # ── Semgrep SAST (free OSS — no account needed) ─────────────────────────────
  semgrep-sast:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Semgrep scan
        run: |
          pip install semgrep
          semgrep --config=auto --error backend/src/ frontend/src/

  # ── Prompt injection test ──────────────────────────────────────────────────
  prompt-injection:
    needs: [backend-e2e]
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: homeservices
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s --health-timeout 5s --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/homeservices
      JWT_SECRET: ci-test-jwt-secret-value-0123456789abcdef
      NODE_ENV: development
      TZ: Asia/Kuala_Lumpur

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install backend deps
        working-directory: backend
        run: npm install --no-audit --no-fund

      - name: Sync schema + seed
        working-directory: backend
        run: |
          npx prisma db push --skip-generate
          npx prisma generate
          npm run seed

      - name: Start backend
        working-directory: backend
        run: |
          npx ts-node src/index.ts &
          sleep 5
          curl -s http://localhost:3000/health || true

      - name: Run prompt injection tests
        working-directory: backend
        run: node tests/security/prompt-injection.mjs

  # ── WhatsApp notification via Meta Cloud API ──────────────────────────────
  notify:
    needs: [backend, frontend, backend-e2e, browser-e2e, secret-scan, semgrep-sast, prompt-injection, npm-audit]
    if: always()
    runs-on: ubuntu-latest
    env:
      META_TOKEN: ${{ secrets.META_TOKEN || '' }}
      META_PHONE_ID: ${{ secrets.META_PHONE_ID || '' }}
      META_WHATSAPP_TO: ${{ secrets.META_WHATSAPP_TO || '' }}
    steps:
      - name: Send WhatsApp notification
        if: env.META_TOKEN != '' && env.META_PHONE_ID != '' && env.META_WHATSAPP_TO != ''
        run: |
          REF="${{ github.ref_name }}"
          URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          B="${{ needs.backend.result }}"; F="${{ needs.frontend.result }}"; E="${{ needs.backend-e2e.result }}"
          Br="${{ needs.browser-e2e.result }}"; G="${{ needs.secret-scan.result }}"; S="${{ needs.semgrep-sast.result }}"
          P="${{ needs.prompt-injection.result }}"; A="${{ needs.npm-audit.result }}"

          FAILS=0
          [ "$B" != "success" ] && FAILS=$((FAILS+1))
          [ "$F" != "success" ] && FAILS=$((FAILS+1))
          [ "$E" != "success" ] && FAILS=$((FAILS+1))
          [ "$Br" != "success" ] && FAILS=$((FAILS+1))
          [ "$G" != "success" ] && FAILS=$((FAILS+1))
          [ "$S" != "success" ] && FAILS=$((FAILS+1))
          [ "$P" != "success" ] && FAILS=$((FAILS+1))
          [ "$A" != "success" ] && FAILS=$((FAILS+1))

          if [ "$FAILS" -eq 0 ]; then
            TEXT="*PASS* pr-gate — ${REF}%0AAll 8 jobs ok%0A${URL}"
          else
            TEXT="*FAIL* pr-gate — ${REF}%0AB=${B} F=${F} E2E=${E} BrE2E=${Br}%0ATruffle=${G} Semgrep=${S} Inj=${P} Aud=${A}%0A${URL}"
          fi

          TO="$META_WHATSAPP_TO"
          RTYPE="individual"
          if echo "$TO" | grep -q "@g.us"; then RTYPE="group"; fi

          RESP=$(curl -s -w '\n%{http_code}' -X POST "https://graph.facebook.com/v25.0/${META_PHONE_ID}/messages" \
            -H "Authorization: Bearer ${META_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"messaging_product\":\"whatsapp\",\"recipient_type\":\"${RTYPE}\",\"to\":\"${TO}\",\"type\":\"text\",\"text\":{\"preview_url\":true,\"body\":\"${TEXT}\"}}")
          HTTP_CODE=$(echo "$RESP" | tail -1)
          BODY=$(echo "$RESP" | sed '$d')
          echo "Meta API HTTP ${HTTP_CODE}: ${BODY}"
