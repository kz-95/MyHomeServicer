<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Style B Preview</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
/* === VIEWPORT BASE === */
html, body { width:100%; height:100%; margin:0; overflow:hidden; background:#1A1A1A; }
.deck-viewport { position:fixed; inset:0; overflow:hidden; background:#1A1A1A; }
.deck-stage { position:absolute; left:0; top:0; width:1920px; height:1080px; overflow:hidden; transform-origin:0 0; }
.slide { position:absolute; inset:0; width:1920px; height:1080px; overflow:hidden; }
@media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration:0.01ms !important; } }

/* === NEO-GRID BOLD PALETTE === */
:root {
  --paper: #F5F4EF;
  --bg: #ECECE8;
  --ink: #0A0A0A;
  --lemon: #E6FF3D;
  --muted: #8A8A85;
  --stage-bg: #1A1A1A;
}

/* === SLIDE === */
.slide {
  background: var(--bg);
  font-family: 'Space Grotesk', sans-serif;
}

/* === 12-col × 8-row grid inset 40px === */
.grid {
  position: absolute;
  inset: 40px;
  display: grid;
  grid-template-columns: repeat(12, 1fr);
  grid-template-rows: repeat(8, 1fr);
  gap: 12px;
}

/* Panel base */
.panel {
  background: var(--paper);
  overflow: hidden;
}
.panel-ink { background: var(--ink); }
.panel-lemon { background: var(--lemon); }
.panel-bg { background: var(--bg); }

/* Page number panel — top-left */
.p-num {
  grid-column: 1 / span 1;
  grid-row: 1 / span 1;
  background: var(--lemon);
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  animation: pop 0.4s ease forwards 0.1s;
}
.num-text {
  font-family: 'JetBrains Mono', monospace;
  font-size: 22px;
  font-weight: 700;
  letter-spacing: 0.1em;
  color: var(--ink);
  text-transform: uppercase;
}

/* Label strip — top center */
.p-label {
  grid-column: 2 / span 8;
  grid-row: 1 / span 1;
  background: var(--bg);
  display: flex;
  align-items: center;
  padding: 0 24px;
  opacity: 0;
  animation: fadeIn 0.4s ease forwards 0.2s;
}
.label-text {
  font-family: 'JetBrains Mono', monospace;
  font-size: 14px;
  font-weight: 400;
  letter-spacing: 0.12em;
  color: var(--muted);
  text-transform: uppercase;
}

/* Date tag — top right */
.p-date {
  grid-column: 10 / span 3;
  grid-row: 1 / span 1;
  background: var(--paper);
  display: flex;
  align-items: center;
  justify-content: flex-end;
  padding: 0 20px;
  opacity: 0;
  animation: fadeIn 0.4s ease forwards 0.2s;
}
.date-text {
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  letter-spacing: 0.1em;
  color: var(--muted);
  text-transform: uppercase;
}

/* Main title block */
.p-title {
  grid-column: 1 / span 8;
  grid-row: 2 / span 5;
  background: var(--ink);
  padding: 60px 70px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  opacity: 0;
  animation: slideUp 0.7s ease forwards 0.35s;
}
.main-title {
  font-size: 148px;
  font-weight: 700;
  line-height: 0.9;
  letter-spacing: -0.04em;
  text-transform: uppercase;
  color: var(--paper);
}
.main-title .accent { color: var(--lemon); }
.title-sub {
  font-family: 'JetBrains Mono', monospace;
  font-size: 18px;
  letter-spacing: 0.08em;
  color: rgba(245,244,239,0.45);
  text-transform: uppercase;
}

/* Right column accent bar */
.p-accent {
  grid-column: 9 / span 1;
  grid-row: 2 / span 3;
  background: var(--lemon);
  opacity: 0;
  animation: slideUp 0.6s ease forwards 0.5s;
}

/* Right description panel */
.p-desc {
  grid-column: 10 / span 3;
  grid-row: 2 / span 5;
  background: var(--paper);
  padding: 44px 36px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  opacity: 0;
  animation: slideUp 0.6s ease forwards 0.6s;
}
.desc-heading {
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--muted);
  font-family: 'JetBrains Mono', monospace;
  border-bottom: 2px solid var(--ink);
  padding-bottom: 14px;
  margin-bottom: 24px;
}
.desc-item {
  padding: 16px 0;
  border-bottom: 1px solid rgba(10,10,10,0.12);
}
.desc-item-num {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.1em;
  color: var(--muted);
  text-transform: uppercase;
  margin-bottom: 4px;
}
.desc-item-text {
  font-size: 17px;
  font-weight: 600;
  color: var(--ink);
  letter-spacing: -0.01em;
}

/* Bottom left stamp */
.p-stamp {
  grid-column: 1 / span 2;
  grid-row: 7 / span 2;
  background: var(--lemon);
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  animation: pop 0.4s ease forwards 0.8s;
}
.stamp-text {
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--ink);
  text-align: center;
  line-height: 1.6;
}

/* Bottom center tech strip */
.p-tech {
  grid-column: 3 / span 6;
  grid-row: 7 / span 2;
  background: var(--paper);
  padding: 0 36px;
  display: flex;
  align-items: center;
  gap: 40px;
  opacity: 0;
  animation: fadeIn 0.5s ease forwards 0.9s;
}
.tech-item {
  font-family: 'JetBrains Mono', monospace;
  font-size: 15px;
  color: var(--ink);
  letter-spacing: 0.06em;
  text-transform: uppercase;
}
.tech-sep {
  width: 4px;
  height: 4px;
  background: var(--lemon);
  border-radius: 0;
  flex-shrink: 0;
}

/* Bottom right corner mark */
.p-corner {
  grid-column: 9 / span 4;
  grid-row: 7 / span 2;
  background: var(--ink);
  display: flex;
  align-items: center;
  justify-content: flex-end;
  padding: 0 36px;
  opacity: 0;
  animation: fadeIn 0.5s ease forwards 0.95s;
}
.corner-text {
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  letter-spacing: 0.15em;
  color: rgba(245,244,239,0.35);
  text-transform: uppercase;
}

/* Blockmark decorations */
.blockmark {
  position: absolute;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 3px;
}
.blockmark div { background: var(--lemon); }
.bm1 { top: 52px; right: 52px; width: 18px; height: 18px; }
.bm1 div { width: 7px; height: 7px; }
.bm2 { bottom: 52px; left: 52px; width: 18px; height: 18px; opacity: 0.4; }
.bm2 div { width: 7px; height: 7px; background: var(--ink); }

/* Animations */
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
@keyframes slideUp { from{opacity:0;transform:translateY(30px)} to{opacity:1;transform:translateY(0)} }
@keyframes pop { from{opacity:0;transform:scale(0.9)} to{opacity:1;transform:scale(1)} }
</style>
</head>
<body>
<div class="deck-viewport">
  <div class="deck-stage" id="stage">
    <div class="slide active">
      <div class="grid">
        <div class="p-num"><span class="num-text">01</span></div>
        <div class="p-label"><span class="label-text">Capstone Project Presentation</span></div>
        <div class="p-date"><span class="date-text">2026</span></div>
        <div class="p-title">
          <div class="main-title">My<span class="accent">Ser</span>vicer</div>
          <div class="title-sub">Home Services Marketplace Platform</div>
        </div>
        <div class="p-accent"></div>
        <div class="p-desc">
          <div>
            <div class="desc-heading">Platform Overview</div>
            <div class="desc-item">
              <div class="desc-item-num">01 —</div>
              <div class="desc-item-text">Customer Booking</div>
            </div>
            <div class="desc-item">
              <div class="desc-item-num">02 —</div>
              <div class="desc-item-text">Servicer Management</div>
            </div>
            <div class="desc-item">
              <div class="desc-item-num">03 —</div>
              <div class="desc-item-text">Admin Dashboard</div>
            </div>
            <div class="desc-item" style="border-bottom:none;">
              <div class="desc-item-num">04 —</div>
              <div class="desc-item-text">Payments & Analytics</div>
            </div>
          </div>
        </div>
        <div class="p-stamp"><span class="stamp-text">Full<br>Stack<br>Build</span></div>
        <div class="p-tech">
          <span class="tech-item">Angular</span><div class="tech-sep"></div>
          <span class="tech-item">Node.js</span><div class="tech-sep"></div>
          <span class="tech-item">PostgreSQL</span>
        </div>
        <div class="p-corner"><span class="corner-text">Capstone · 2026</span></div>
      </div>
      <div class="blockmark bm1"><div></div><div></div><div></div><div></div></div>
      <div class="blockmark bm2"><div></div><div></div><div></div><div></div></div>
    </div>
  </div>
</div>
<script>
(function() {
  const stage = document.getElementById('stage');
  function fit() {
    const vw = window.innerWidth, vh = window.innerHeight;
    const sc = Math.min(vw / 1920, vh / 1080);
    const tx = (vw - 1920 * sc) / 2, ty = (vh - 1080 * sc) / 2;
    stage.style.transform = `translate(${tx}px,${ty}px) scale(${sc})`;
  }
  fit(); window.addEventListener('resize', fit);
})();
</script>
</body>
</html>
